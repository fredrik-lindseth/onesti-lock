  description: Set or change the name for a slot without changing the PIN
  fields:
    slot:
      name: Slot
      description: User slot (3-199, slots 0-2 reserved for master codes)
      required: true
      selector:
        number:
          min: 3
          max: 199
          mode: box
    name:
      name: Name
      description: Name for this user
      required: true
      selector:
        text:
    ieee:
      name: IEEE address
      description: Lock IEEE address (optional if only one lock)
      required: false
      selector:
        text:

clear_slot:
  name: Clear slot
  description: Remove all credentials and name from a slot
  fields:
    slot:
      name: Slot
      description: User slot (3-199, slots 0-2 reserved for master codes)
      required: true
      selector:
        number:
          min: 3
          max: 199
          mode: box
    ieee:
      name: IEEE address
      description: Lock IEEE address (optional if only one lock)
      required: false
      selector:
        text:
