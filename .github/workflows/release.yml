name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/onesti_lock/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Creating new release v${{ steps.version.outputs.version }}"
          fi

      - name: Get commit messages since last tag
        id: changelog
        if: steps.check_release.outputs.exists == 'false'
        run: |
          # Get all tags, find the one before current version
          CURRENT_VERSION="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "$CURRENT_VERSION" | head -n 1)
          
          if [ -z "$PREV_TAG" ]; then
            # First release - get recent commits (limit to 20)
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
            echo "First release - showing recent commits"
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            echo "Commits since $PREV_TAG"
          fi
          
          if [ -z "$COMMITS" ]; then
            COMMITS="- Initial release"
          fi
          
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Changes
            
            ${{ steps.changelog.outputs.commits }}
            
            ---
            
            **Full Changelog**: https://github.com/fredrik-lindseth/onesti-lock/compare/${{ steps.changelog.outputs.prev_tag || 'initial' }}...v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Create ZIP for HACS
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mkdir -p dist
          zip -r dist/onesti_lock.zip custom_components/onesti_lock
          echo "Created ZIP for HACS"

      - name: Upload ZIP to release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/onesti_lock.zip
