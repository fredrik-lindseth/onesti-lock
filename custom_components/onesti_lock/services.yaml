set_pin:
  name: Set PIN code
  description: Set a PIN code for a lock slot
  fields:
    slot:
      name: Slot
      description: User slot (3-199, slots 0-2 reserved for master codes)
      required: true
      selector:
        number:
          min: 3
          max: 199
          mode: box
    name:
      name: Name
      description: Name for this user (e.g. "Kari")
      required: true
      selector:
        text:
    code:
      name: PIN code
      description: PIN code (4-8 digits)
      required: true
      selector:
        text:
    ieee:
      name: IEEE address
      description: Lock IEEE address (optional if only one lock)
      required: false
      selector:
        text:

clear_pin:
  name: Clear PIN code
  description: Remove a PIN code from a lock slot
  fields:
    slot:
      name: Slot
      description: User slot (3-199, slots 0-2 reserved for master codes)
      required: true
      selector:
        number:
          min: 3
          max: 199
          mode: box
    ieee:
      name: IEEE address
      description: Lock IEEE address (optional if only one lock)
      required: false
      selector:
        text:

set_name:
