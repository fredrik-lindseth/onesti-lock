name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/onesti_lock/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Creating new release v${{ steps.version.outputs.version }}"
          fi

      - name: Get commit messages since last tag
        id: changelog
        if: steps.check_release.outputs.exists == 'false'
        run: |
          CURRENT_VERSION="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "$CURRENT_VERSION" | head -n 1)

          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            RANGE_DESC="first release"
          else
            RANGE="${PREV_TAG}..HEAD"
            RANGE_DESC="since ${PREV_TAG}"
          fi

          # Group commits by conventional commit prefix
          declare -A sections=(
            ["feat"]="### Features"
            ["fix"]="### Bug fixes"
            ["docs"]="### Documentation"
            ["chore"]="### Chores"
            ["refactor"]="### Refactoring"
            ["test"]="### Tests"
            ["ci"]="### CI/CD"
          )
          order=("feat" "fix" "docs" "refactor" "test" "ci" "chore")

          body=""
          for prefix in "${order[@]}"; do
            if [ -z "$PREV_TAG" ]; then
              commits=$(git log --pretty=format:"%s" --no-merges -20 | grep -E "^${prefix}(\(.+\))?!?:" || true)
            else
              commits=$(git log ${RANGE} --pretty=format:"%s" --no-merges | grep -E "^${prefix}(\(.+\))?!?:" || true)
            fi
            if [ -n "$commits" ]; then
              body="${body}${sections[$prefix]}"$'\n\n'
              while IFS= read -r line; do
                # Strip "prefix: " or "prefix(scope): " from the start
                clean=$(echo "$line" | sed -E "s/^${prefix}(\(.+\))?!?:\s*//")
                body="${body}- ${clean}"$'\n'
              done <<< "$commits"
              body="${body}"$'\n'
            fi
          done

          # Fallback: any commits that didn't match known prefixes
          if [ -z "$PREV_TAG" ]; then
            other=$(git log --pretty=format:"%s" --no-merges -20 | grep -vE "^(feat|fix|docs|chore|refactor|test|ci)(\(.+\))?!?:" || true)
          else
            other=$(git log ${RANGE} --pretty=format:"%s" --no-merges | grep -vE "^(feat|fix|docs|chore|refactor|test|ci)(\(.+\))?!?:" || true)
          fi
          if [ -n "$other" ]; then
            body="${body}### Other"$'\n\n'
            while IFS= read -r line; do
              body="${body}- ${line}"$'\n'
            done <<< "$other"
          fi

          if [ -z "$body" ]; then
            body="No commits ${RANGE_DESC}."
          fi

          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            **Full changelog**: https://github.com/fredrik-lindseth/onesti-lock/compare/${{ steps.changelog.outputs.prev_tag }}...v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Create ZIP for HACS
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mkdir -p dist
          zip -r dist/onesti_lock.zip custom_components/onesti_lock
          echo "Created ZIP for HACS"

      - name: Upload ZIP to release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/onesti_lock.zip
